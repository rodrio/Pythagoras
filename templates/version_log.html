<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Version Log - Pythagoras</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="topbar">
    <button class="hamburger" onclick="document.getElementById('menu-overlay').classList.toggle('open')">☰</button>
    <span class="brand">Pythagoras</span>
  </div>
  <div id="menu-overlay" class="menu-overlay" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="menu-panel">
      <a href="/">Dashboard</a>
      <a href="/binance">Binance</a>
      <a href="/degiro">DEGIRO</a>
      <a href="/config">Configuration</a>
      <a href="/chat">GenAI chat</a>
      <a href="/version-log">Version log</a>
    </div>
  </div>
  <main class="shell">
    <header class="hero"><div><p class="eyebrow">Version log</p><h1>Executive change log</h1><p class="muted">Concise record of product increments.</p></div></header>
    <section class="panel version-log">
      {% for entry in entries %}
      <p>{{ entry }}</p>
      {% endfor %}
    </section>
  </main>
</body>
</html>
