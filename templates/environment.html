<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Environment - Pythagoras</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <nav class="nav"><a href="/">Dashboard</a><a href="/menu">Menu</a><a href="/binance">Binance</a><a href="/degiro">DEGIRO</a><a href="/environment">Environment</a><a href="/config/genai">GenAI config</a></nav>
    <header class="hero"><div><p class="eyebrow">Environment</p><h1>Detected variables</h1><p class="muted">Sensitive values are masked and only shown as configured or missing.</p></div></header>
    <section class="panel"><table><thead><tr><th>Variable</th><th>Status</th><th>Value</th></tr></thead><tbody>{% for variable in variables %}<tr><td>{{ variable.name }}</td><td>{{ variable.status }}</td><td>{{ variable.value }}</td></tr>{% endfor %}</tbody></table></section>
  </main>
</body>
</html>
